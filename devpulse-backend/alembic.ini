# Alembic configuration for DevPulse
# Run migrations:  alembic upgrade head
# Create revision: alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
# URL is overridden in env.py from DATABASE_URL env var.
# This fallback is only used if the env var is unset.
sqlalchemy.url = sqlite+aiosqlite:///devpulse.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
