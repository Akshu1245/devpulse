# DevPulse v4.0 – Full Stack Docker Compose
# The API Security & Cost Intelligence Platform Built for the AI Agent Era
# Usage: docker-compose up --build

version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./devpulse-backend
      dockerfile: Dockerfile
    container_name: devpulse-backend
    ports:
      - "8000:8000"
    env_file:
      - ./devpulse-backend/.env
    environment:
      - ENV=production
      - PORT=8000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql+asyncpg://devpulse:devpulse_secret@postgres:5432/devpulse
      - REDIS_URL=redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Frontend Dashboard ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./devpulse-dashboard-ui
      dockerfile: Dockerfile
    container_name: devpulse-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  backend-data:
